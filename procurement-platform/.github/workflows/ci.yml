name: ProcureX CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: procurement-platform/package-lock.json
      - run: npm install
        working-directory: procurement-platform
      - run: npm run build
        working-directory: procurement-platform
      - run: npm test
        working-directory: procurement-platform

